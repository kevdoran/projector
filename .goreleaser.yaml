version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: pj
    main: ./cmd/projector
    binary: pj
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Tag}} -X main.commit={{.ShortCommit}} -X main.buildDate={{.Date}}

archives:
  - name_template: "pj_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - pj
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: false

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: pj
    homepage: "https://github.com/kevdoran/projector"
    description: "Manage parallel projects backed by git worktrees"
    repository:
      owner: kevdoran
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    dependencies:
      - formula: git
