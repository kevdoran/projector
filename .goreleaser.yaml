version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: ./cmd/projector
    binary: pj
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Tag}} -X main.commit={{.ShortCommit}} -X main.buildDate={{.Date}}

archives:
  - name_template: "pj_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: pj
    homepage: "https://github.com/kevdoran/projector"
    description: "Manage parallel projects backed by git worktrees"
    repository:
      owner: kevdoran
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    dependencies:
      - formula: git
